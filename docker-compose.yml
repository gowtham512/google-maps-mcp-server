services:
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: travel-agent-backend
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://user:password@host.neon.tech/dbname?sslmode=require}
    ports:
      - "8000:8000"
    networks:
      - travel-agent-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: travel-agent-web
    ports:
      - "80:80"
    networks:
      - travel-agent-net
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  travel-agent-net:
    driver: bridge
