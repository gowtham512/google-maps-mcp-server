services:
  api:
    build: .
    container_name: maps-agent-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=file:/data/maps-agent.db
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:latest}
    volumes:
      - data:/data
    restart: unless-stopped

  web:
    build: .
    container_name: maps-agent-web
    command: node apps/web/.next/standalone/server.js
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - API_PROXY_URL=http://api:3000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  data:
